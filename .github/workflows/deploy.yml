name: Deploy Slide Presentation to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permisos necesarios para desplegar a GitHub Pages mediante Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Cancelar ejecuciones en cola si se empuja un nuevo cambio rápidamente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages Infrastructure
        uses: actions/configure-pages@v4

      - name: Upload Static Content Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Subir todo el contenido de la raíz (index.html, css/, js/)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
